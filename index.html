<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="calculator" aria-label="calculator">
        <div class="toolbar">
          <span class="badge">AI Calc</span>
          <div class="menu-wrap">
            <button class="menu-btn" id="menu-btn" type="button" aria-label="Open menu" aria-expanded="false">☰</button>
            <div class="menu-panel" id="menu-panel" role="menu" aria-label="Calculator menu">
              <button class="menu-item" id="about-btn" type="button" role="menuitem">About</button>
            </div>
          </div>
        </div>

        <div class="display-shell">
          <div class="display-meta">
            <span class="badge badge-soft">Advanced</span>
            <span class="memory-pill" id="memory-pill">M: 0</span>
          </div>
          <div class="display-history" id="display-history">0</div>
          <div class="display" id="display">0</div>
        </div>

        <div class="feature-bar" aria-label="memory shortcuts">
          <button class="chip" data-action="memory-clear">MC</button>
          <button class="chip" data-action="memory-recall">MR</button>
          <button class="chip" data-action="memory-add">M+</button>
          <button class="chip" data-action="memory-subtract">M−</button>
        </div>

        <div class="secondary-row" aria-label="scientific shortcuts">
          <button class="btn btn-secondary" data-action="sqrt">√</button>
          <button class="btn btn-secondary" data-action="square">x²</button>
          <button class="btn btn-secondary" data-action="reciprocal">1/x</button>
          <button class="btn btn-secondary" data-action="pi">π</button>
          <button class="btn btn-secondary" data-action="exp">exp</button>
          <button class="btn btn-secondary" data-action="factorial">n!</button>
          <button class="btn btn-secondary" data-action="negate">±</button>
          <button class="btn btn-secondary" data-action="clear-entry">CE</button>
        </div>

        <div class="secondary-row" aria-label="advanced shortcuts">
          <button class="btn btn-secondary" data-action="sin">sin</button>
          <button class="btn btn-secondary" data-action="cos">cos</button>
          <button class="btn btn-secondary" data-action="tan">tan</button>
          <button class="btn btn-secondary" data-action="log">log</button>
          <button class="btn btn-secondary" data-action="ln">ln</button>
          <button class="btn btn-secondary" data-action="abs">abs</button>
          <button class="btn btn-secondary" data-action="tenx">10ˣ</button>
          <button class="btn btn-secondary" data-action="ans">Ans</button>
        </div>

        <div class="buttons">
          <button class="btn btn-accent" data-action="clear">C</button>
          <button class="btn btn-accent" data-action="backspace">⌫</button>
          <button class="btn btn-accent" data-action="sign">±</button>
          <button class="btn btn-operator" data-value="/">÷</button>

          <button class="btn" data-value="7">7</button>
          <button class="btn" data-value="8">8</button>
          <button class="btn" data-value="9">9</button>
          <button class="btn btn-operator" data-value="*">×</button>

          <button class="btn" data-value="4">4</button>
          <button class="btn" data-value="5">5</button>
          <button class="btn" data-value="6">6</button>
          <button class="btn btn-operator" data-value="-">−</button>

          <button class="btn" data-value="1">1</button>
          <button class="btn" data-value="2">2</button>
          <button class="btn" data-value="3">3</button>
          <button class="btn btn-operator" data-value="+">+</button>

          <button class="btn btn-zero" data-value="0">0</button>
          <button class="btn" data-value=".">.</button>
          <button class="btn btn-equals" data-action="equals">=</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
