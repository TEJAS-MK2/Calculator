<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="calculator" aria-label="calculator">
        <div class="display-shell">
          <div class="display-history" id="display-history">0</div>
          <div class="display" id="display">0</div>
        </div>

        <div class="buttons">
          <button class="btn btn-accent" data-action="clear">C</button>
          <button class="btn btn-accent" data-action="sign">±</button>
          <button class="btn btn-accent" data-action="percent">%</button>
          <button class="btn btn-operator" data-value="/">÷</button>

          <button class="btn" data-value="7">7</button>
          <button class="btn" data-value="8">8</button>
          <button class="btn" data-value="9">9</button>
          <button class="btn btn-operator" data-value="*">×</button>

          <button class="btn" data-value="4">4</button>
          <button class="btn" data-value="5">5</button>
          <button class="btn" data-value="6">6</button>
          <button class="btn btn-operator" data-value="-">−</button>

          <button class="btn" data-value="1">1</button>
          <button class="btn" data-value="2">2</button>
          <button class="btn" data-value="3">3</button>
          <button class="btn btn-operator" data-value="+">+</button>

          <button class="btn btn-zero" data-value="0">0</button>
          <button class="btn" data-value=".">.</button>
          <button class="btn btn-equals" data-action="equals">=</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
